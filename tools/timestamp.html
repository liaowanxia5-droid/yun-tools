  <div class="tool-card-body"><div class="form-group"><label class="label">时间戳→日期</label><div class="flex-row"><input type="text" id="tsInput" placeholder="输入Unix时间戳" style="flex:1"><select id="tsType" style="width:auto"><option value="s">秒</option><option value="ms">毫秒</option></select><button class="btn btn-primary" onclick="tsToDate()">转换</button></div><div id="tsResult1" class="output-area" style="margin-top:8px"></div></div>

<script>function tsToDate(){var v=document.getElementById("tsInput").value.trim();if(!v){document.getElementById("tsResult1").textContent="请输入时间戳";return}var ts=parseInt(v);if(isNaN(ts)){document.getElementById("tsResult1").textContent="无效";return}var ms=document.getElementById("tsType").value==="ms",d=new Date(ms?ts:ts*1000);document.getElementById("tsResult1").innerHTML=d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate()+" "+d.getHours()+":"+d.getMinutes()+":"+d.getSeconds()+"<br>ISO: "+d.toISOString()}function dateToTs(){var v=document.getElementById("dateInput").value;if(!v){document.getElementById("tsResult2").textContent="请选择";return}var d=new Date(v);document.getElementById("tsResult2").innerHTML="秒: "+Math.floor(d.getTime()/1000)+"<br>毫秒: "+d.getTime()}function refreshNow(){var n=new Date();document.getElementById("nowTs").value=Math.floor(n.getTime()/1000)+" ("+n.toLocaleString("zh-CN")+")"}refreshNow();setInterval(refreshNow,1000)</script></div>
