<script>function generateQR(){var t=document.getElementById("qrInput").value.trim();if(!t){alert("请输入内容");return}var c=document.getElementById("qrCanvas"),ctx=c.getContext("2d");c.width=280;c.height=280;ctx.fillStyle="#fff";ctx.fillRect(0,0,280,280);ctx.fillStyle="#1f2937";var d=[];for(var i=0;i<t.length;i++){var b=t.charCodeAt(i);for(var j=0;j<8;j++){d.push((b>>(7-j))&1)}}var l=Math.ceil(Math.sqrt(d.length+16)),cs=Math.floor(240/l),off=(280-l*cs)/2;for(var r=0;r<l;r++){for(var c2=0;c2<l;c2++){var idx=r*l+c2;if(idx<d.length&&d[idx]){ctx.fillRect(off+c2*cs,off+r*cs,cs,cs)}}}ctx.fillStyle="#1f2937";[[0,0],[l-7,0],[0,l-7]].forEach(function(p){ctx.fillRect(off+p[0]*cs,off+p[1]*cs,7*cs,7*cs);ctx.fillStyle="#fff";ctx.fillRect(off+(p[0]+1)*cs,off+(p[1]+1)*cs,5*cs,5*cs);ctx.fillStyle="#1f2937";ctx.fillRect(off+(p[0]+2)*cs,off+(p[1]+2)*cs,3*cs,3*cs)});document.getElementById("qrResult").style.display="block";document.getElementById("downloadQR").style.display="inline-flex"}function downloadQRCode(){var a=document.createElement("a");a.href=document.getElementById("qrCanvas").toDataURL("image/png");a.download="qrcode.png";a.click()}function clearQR(){document.getElementById("qrInput").value="";document.getElementById("qrResult").style.display="none";document.getElementById("downloadQR").style.display="none"}</script></div>
