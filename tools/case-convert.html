  <div class="tool-card-body"><div class="form-group"><label class="label">输入文本</label><textarea id="ccInput" rows="6" placeholder="输入要转换的文本..." oninput="ccConvert()"></textarea></div>

<script>function ccConvert(){var t=document.getElementById("ccInput").value;document.getElementById("ccUpper").value=t.toUpperCase();document.getElementById("ccLower").value=t.toLowerCase();document.getElementById("ccCap").value=t.toLowerCase().replace(/(?:^|\s)\S/g,function(a){return a.toUpperCase()});var w=t.toLowerCase().match(/[a-z0-9]+/g)||[""];document.getElementById("ccCamel").value=w[0]+w.slice(1).map(function(x){return x[0].toUpperCase()+x.slice(1)}).join("");document.getElementById("ccSnake").value=w.join("_");document.getElementById("ccKebab").value=w.join("-")}</script></div>
